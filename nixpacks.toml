# nixpacks.toml — tells Railway exactly how to build this Python app
# Railway auto-detects Python from requirements.txt but this makes it explicit

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2"
