# render.yaml — Infrastructure as Code for Render.com
# Commit this file and Render reads it automatically via Blueprint deploy.

services:
  - type: web
    name: sipms
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sipms-db
          property: connectionString

databases:
  - name: sipms-db
    databaseName: sipms
    user: sipms_user
    plan: free
    region: oregon
