# render.yaml — Infrastructure as Code for Render.com
#
# This file tells Render exactly how to build and run our app.
# Commit this file to GitHub and Render will auto-detect it.
#
# To deploy:
# 1. Push this repo to GitHub
# 2. Go to render.com → New → Blueprint
# 3. Connect your GitHub repo — Render reads this file automatically

services:
  - type: web
    name: sipms
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true       # Render auto-generates a secure random key
      - key: DATABASE_URL
        fromDatabase:
          name: sipms-db          # Links to the PostgreSQL DB defined below
          property: connectionString

databases:
  - name: sipms-db
    databaseName: sipms
    user: sipms_user
    plan: free                    # Render's free PostgreSQL tier (90-day retention)
